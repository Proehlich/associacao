<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loja</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">
    <nav class="bg-blue-600 p-4 text-white shadow-md sticky top-0 z-50">
        <div class="max-w-6xl mx-auto relative">

            <!-- --- VERSÃO DESKTOP (PC) --- -->
            <div class="hidden md:flex items-center justify-between">
                <!-- Esquerda: Título + Menu -->
                <div class="flex items-center space-x-4">
                    <h1 class="font-bold text-xl uppercase tracking-tighter">Loja</h1>
                    <div id="menuAdminPC" class="hidden items-center space-x-2">
                        <a href="motoboys.html" class="bg-blue-800 hover:bg-blue-900 px-3 py-1 rounded text-sm font-semibold transition">👥Associados</a>
                        <a href="admin-produtos.html" class="bg-blue-800 hover:bg-blue-900 px-3 py-1 rounded text-sm font-semibold transition">➕Produtos</a>
                        <a href="admin-sac.html" class="bg-red-700 hover:bg-red-800 px-3 py-1 rounded text-sm font-semibold transition">📩Reclamações</a>
                    </div>
                    <a href="loja.html" class="bg-blue-800 hover:bg-blue-900 px-3 py-1 rounded text-sm font-semibold transition">🛒Loja</a>
                    <a href="sac.html" class="bg-blue-800 hover:bg-blue-900 px-3 py-1 rounded text-sm font-semibold transition">💬SAC</a>
                    <a href="perfil.html" class="bg-blue-800 hover:bg-blue-900 px-3 py-1 rounded text-sm font-semibold transition">👤Perfil</a>
                </div>
                <!-- Direita: Mural + Sair -->
                <div class="flex items-center space-x-2">
                    <a href="dashboard.html"
                        class="bg-blue-800 hover:bg-blue-900 px-4 py-1 rounded font-bold text-sm flex items-center gap-1 shadow-sm">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                        </svg>
                        MURAL
                    </a>
                    <button onclick="logout()"
                        class="bg-red-700 hover:bg-red-800 px-4 py-1 rounded text-sm font-black uppercase shadow-sm">Sair</button>
                </div>
            </div>

            <!-- --- VERSÃO MOBILE (CELULAR) --- -->
            <div class="flex md:hidden items-center justify-between">
                <!-- Esquerda: Hambúrguer -->
                <button id="btnMenu" class="p-2 bg-blue-700 rounded-lg focus:outline-none">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 6h16M4 12h16m-7 6h7"></path>
                    </svg>
                </button>

                <!-- Centro: H1 Centralizado -->
                <h1 class="absolute left-1/2 -translate-x-1/2 font-bold text-lg uppercase tracking-tighter">Loja dos Associados
                </h1>

                <!-- Direita: Mural + Sair -->
                <div class="flex items-center space-x-1">
                    <a href="dashboard.html" class="bg-blue-800 p-2 rounded-lg"><svg class="w-5 h-5" fill="none"
                            stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                        </svg></a>
                    <button onclick="logout()" class="bg-red-700 p-2 rounded-lg font-black text-xs">SAIR</button>
                </div>
            </div>

            <!-- ABA DO MENU (GAVETA MOBILE) -->
            <div id="linksNav"
                class="hidden absolute top-[64px] left-1/2 -translate-x-1/2 w-[90%] bg-blue-600 p-5 shadow-2xl z-50 rounded-b-3xl border-x border-b border-blue-400 flex-col space-y-4 items-center">
                <div id="menuAdminMobile" class="hidden flex-col space-y-3 w-full">
                    <a href="motoboys.html"
                        class="bg-blue-800 py-3 px-4 rounded-xl text-sm font-bold text-center block w-full">👥Associados</a>
                    <a href="admin-produtos.html"
                        class="bg-blue-800 py-3 px-4 rounded-xl text-sm font-bold text-center block w-full">➕Produtos</a>
                    <a href="admin-sac.html"
                        class="bg-red-700 py-3 px-4 rounded-xl text-sm font-bold text-center block w-full">📩Reclamações</a>
                </div>
                <a href="loja.html" class="bg-blue-800 py-3 px-4 rounded-xl text-sm font-bold text-center block w-full">🛒Loja</a>
                <a href="sac.html" class="bg-blue-800 py-3 px-4 rounded-xl text-sm font-bold text-center block w-full">💬SAC</a>
                <a href="perfil.html" class="bg-blue-800 py-3 px-4 rounded-xl text-sm font-bold text-center block w-full">Perfil</a>
            </div>
        </div>
    </nav>
    <main class="p-6 max-w-6xl mx-auto">
        <div id="statusAlerta" class="hidden mb-6 p-4 rounded-lg font-bold text-center"></div>

        <h2 class="text-2xl font-bold text-gray-800 mb-8 border-b-4 border-blue-600 inline-block">Peças e Acessórios
        </h2>

        <div id="gridProdutos" class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <!-- Os produtos aparecerão aqui -->
        </div>
    </main>
    <footer class="mt-12 border-t py-6 text-center text-gray-500 text-sm">
        <p>&copy; 2024 Associação de Motoboys - Sistema de Apoio ao Associado</p>
        <div class="mt-2 space-x-4">
            <a href="politicas.html" class="hover:text-blue-600 underline">Políticas de Privacidade</a>
            <a href="termos.html" class="hover:text-blue-600 underline">Termos de Uso</a>
            <span class="text-gray-300">|</span>
            <span class="font-bold text-blue-500">Status: Mensalidade em dia</span>
        </div>
    </footer>
    <script>
        // 1. SEGURANÇA E TOKEN
        const token = localStorage.getItem('token');
        if (!token) {
            window.location.href = 'index.html';
        }
        const payload = JSON.parse(atob(token.split('.')[1]));

        // 2. MOSTRAR MENU SE FOR ADMIN
        if (payload.tipo === 'admin') {
            const menuAdmin = document.getElementById('menuAdmin');
            if (menuAdmin) {
                menuAdmin.classList.remove('hidden');
                menuAdmin.classList.add('flex');
            }
        }

        // 3. FUNÇÃO PARA CARREGAR PRODUTOS
        async function carregarProdutos() {
            try {
                const res = await fetch('/api/produtos');
                const produtos = await res.json();
                const grid = document.getElementById('gridProdutos');

                if (produtos.length === 0) {
                    grid.innerHTML = '<p class="text-gray-500">Nenhum produto cadastrado.</p>';
                    return;
                }

                grid.innerHTML = produtos.map(prod => {
                    const botaoExcluir = payload.tipo === 'admin'
                        ? `<button onclick="excluirProduto(${prod.id}, '${prod.nome}')" class="absolute top-2 right-2 bg-red-100 text-red-600 p-1.5 rounded-full hover:bg-red-600 hover:text-white transition shadow-sm z-20">
                        <svg xmlns="http://w3.org" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                        </svg>
                       </button>`
                        : '';

                    return `
                <div class="relative bg-white rounded-xl shadow-lg overflow-hidden border border-gray-200">
                    ${botaoExcluir}
                    <img src="${prod.imagem_url}" onerror="this.src='https://placehold.co'" class="w-full h-48 object-cover">
                    <div class="p-5">
                        <h3 class="font-bold text-lg text-gray-800">${prod.nome}</h3>
                        <p class="text-gray-600 text-sm mb-4">${prod.descricao}</p>
                        <div class="flex flex-col">
                            <span class="text-xs text-gray-400 font-bold uppercase">Preço Unificado</span>
                            <span class="text-3xl font-black text-blue-600">R$ ${prod.preco}</span>
                        </div>
                        <button class="w-full mt-4 bg-blue-600 text-white py-2 rounded-lg font-bold hover:bg-blue-700 transition shadow-md">
                            🛒 Comprar Agora
                        </button>
                    </div>
                </div>`;
                }).join('');
            } catch (erro) {
                console.error("Erro ao carregar loja:", erro);
            }
        }

        // 4. FUNÇÃO PARA EXCLUIR PRODUTO (A QUE ESTAVA FALTANDO!)
        async function excluirProduto(id, nome) {
            if (!confirm(`⚠️ Deseja realmente excluir o produto: ${nome}?`)) return;

            try {
                const res = await fetch(`/api/produtos/excluir/${id}`, {
                    method: 'POST'
                });

                if (res.ok) {
                    alert("✅ Produto removido com sucesso!");
                    carregarProdutos(); // Recarrega a vitrine para o card sumir
                } else {
                    alert("❌ Erro ao excluir produto.");
                }
            } catch (error) {
                console.error("Erro na requisição:", error);
                alert("Erro de conexão com o servidor.");
            }
        }

        function logout() {
            localStorage.removeItem('token');
            window.location.href = 'index.html';
        }

        carregarProdutos();


        // 1. Lógica do Menu Hambúrguer (Obrigatório em todas as páginas)
        const btnMenu = document.getElementById('btnMenu');
        const linksNav = document.getElementById('linksNav');

        btnMenu?.addEventListener('click', () => {
            linksNav.classList.toggle('hidden');
            linksNav.classList.toggle('flex');
        });

        // 2. Lógica de Segurança (Para os botões de Admin aparecerem)
        if (token) {
            const payload = JSON.parse(atob(token.split('.')[1]));
            if (payload.tipo === 'admin') {
                // Liga o menu do PC
                document.getElementById('menuAdminPC')?.classList.remove('hidden');
                document.getElementById('menuAdminPC')?.classList.add('flex');
                // Liga o menu do Celular
                document.getElementById('menuAdminMobile')?.classList.remove('hidden');
                document.getElementById('menuAdminMobile')?.classList.add('flex');
            }

        }
    </script>
</body>

</html>
