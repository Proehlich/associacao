<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white p-8 rounded-lg shadow-lg w-full max-w-lg">
        <h1 class="text-2xl font-bold mb-2 text-blue-600">Cadastro de Associado</h1>
        <p class="text-gray-500 mb-6 text-sm">Preencha todos os dados para validar seu perfil.</p>

        <form id="cadastroForm" class="space-y-4">
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium">Eu sou:</label>
                    <select id="tipo" name="tipo" class="w-full p-2 border rounded mt-1 bg-gray-50"
                        onchange="ajustarCampos()">
                        <option value="motoboy">Motoboy</option>
                        <option value="restaurante">Restaurante</option>
                        <option value="oficina">Oficina</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium">Foto de Perfil</label>
                    <input type="file" id="foto" name="foto" accept="image/*" class="text-xs mt-1">
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium">Nome Completo / Fantasia</label>
                <input type="text" id="nome" name="nome" required class="w-full p-2 border rounded mt-1">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium">E-mail</label>
                    <input type="email" id="email" name="email" required class="w-full p-2 border rounded mt-1">
                </div>
                <div>
                    <label class="block text-sm font-medium">Senha</label>
                    <input type="password" id="senha" name="senha" required class="w-full p-2 border rounded mt-1">
                </div>
            </div>

            <!-- Campos específicos para Motoboy -->
            <div id="camposMotoboy" class="space-y-4 border-t pt-4">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium">CPF</label>
                        <input type="text" id="cpf" name="cpf" class="w-full p-2 border rounded mt-1">
                    </div>
                    <div>
                        <label class="block text-sm font-medium">CNH</label>
                        <input type="text" id="cnh" name="cnh" class="w-full p-2 border rounded mt-1">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium">WhatsApp</label>
                        <input type="text" id="telefone" name="telefone" class="w-full p-2 border rounded mt-1">
                    </div>
                    <div>
                        <label class="block text-sm font-medium">Placa da Moto</label>
                        <input type="text" id="placa_moto" name="placa_moto" class="w-full p-2 border rounded mt-1">
                    </div>
                </div>
            </div>

            <button type="submit"
                class="w-full bg-blue-600 text-white p-3 rounded font-bold hover:bg-blue-700 transition">Finalizar
                Cadastro</button>
        </form>
    </div>
    <footer class="mt-12 border-t py-6 text-center text-gray-500 text-sm">
        <p>&copy; 2024 Associação de Motoboys - Sistema de Apoio ao Associado</p>
        <div class="mt-2 space-x-4">
            <a href="politicas.html" class="hover:text-blue-600 underline">Políticas de Privacidade</a>
            <a href="termos.html" class="hover:text-blue-600 underline">Termos de Uso</a>
            <span class="text-gray-300">|</span>
            <span class="font-bold text-blue-500">Status: Mensalidade em dia</span>
        </div>
    </footer>
    <script>
        // Esconde campos se não for motoboy
        function ajustarCampos() {
            const tipo = document.getElementById('tipo').value;
            const campos = document.getElementById('camposMotoboy');
            campos.style.display = (tipo === 'motoboy') ? 'block' : 'none';
        }

        document.getElementById('cadastroForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            // FormData é necessário para enviar arquivos (foto)
            const formData = new FormData(e.target);

            const res = await fetch('/api/usuarios/cadastro', {
                method: 'POST',
                body: formData // Não precisa de Headers de JSON aqui!
            });

            if (res.ok) {
                alert("✅ Cadastro realizado! Bem-vindo à associação.");
                window.location.href = 'index.html';
            } else {
                const erro = await res.json();
                alert("❌ Erro: " + erro.erro);
            }
        });

        ajustarCampos();
    </script>
</body>

</html>
